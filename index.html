<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeterH3G's GitHub Pages</title>

    <!-- 1. Link to the external CSS file -->
    <link rel="stylesheet" href="style.css">

    <!-- 2. Include marked.js to parse Markdown into HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- 3. Include particles.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <!-- 4. Container for particles.js background -->
    <div id="particles-js"></div>

    <header>
        <a href="/">PeterH3G</a>
    </header>

    <main class="container">
        <!-- 5. The Markdown content will be injected into this div -->
        <div id="markdown-content" class="markdown-body">Loading README.md...</div>
    </main>

    <footer>
        <div class="bottom">
            <p><a href="/">PeterH3G &reg;</a> 2026 All rights reserved</p>
            <p>Powered by <a href="https://docs.github.com/en/pages" target="_blank">GitHub Pages</a></p>
        </div>
    </footer>

    <script>
        // 6. Fetch the README.md file and parse it
        fetch('README.md')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Could not find README.md in this directory.');
                }
                return response.text();
            })
            .then(markdown => {
                document.getElementById('markdown-content').innerHTML = marked.parse(markdown);
            })
            .catch(error => {
                document.getElementById('markdown-content').innerHTML = '<p style="color: #f85149;">Error: ' + error.message + '</p>';
                console.error('Error loading README.md:', error);
            });

        // 7. Load particles.js configuration from the external JSON file
        particlesJS.load('particles-js', 'particles.json', function() {
            console.log('callback - particles.js configuration loaded');
        });
    </script>
</body>
</html>
