<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeterH3G's GitHub Pages</title>

    <!-- 1. Include marked.js to parse Markdown into HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
        }

        /* 2. Styling for the parsed Markdown elements to look clean */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: #0366d6;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        .markdown-body a {
            color: #0366d6;
            text-decoration: none;
        }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body code {
            background-color: #f6f8fa;
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .markdown-body pre {
            background-color: #f6f8fa;
            padding: 1rem;
            border-radius: 6px;
            overflow: auto;
        }
        .markdown-body pre code { background: none; padding: 0; }
        .markdown-body img { max-width: 100%; }
        .markdown-body blockquote {
            border-left: 4px solid #dfe2e5;
            padding: 0 1em;
            color: #6a737d;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 3. The Markdown content will be injected into this div -->
        <div id="markdown-content" class="markdown-body">Loading README.md...</div>
    </div>

    <script>
        // 4. Fetch the README.md file and parse it
        fetch('README.md')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Could not find README.md in this directory.');
                }
                return response.text();
            })
            .then(markdown => {
                // Convert Markdown to HTML and inject it into the page
                document.getElementById('markdown-content').innerHTML = marked.parse(markdown);
            })
            .catch(error => {
                document.getElementById('markdown-content').innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
                console.error('Error loading README.md:', error);
            });
    </script>
</body>
</html>
