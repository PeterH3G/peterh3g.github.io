<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeterH3G's GitHub Pages</title>

    <!-- 1. Link to the external CSS file -->
    <link rel="stylesheet" href="style.css">

    <!-- 2. Include marked.js to parse Markdown into HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 3. The Markdown content will be injected into this div -->
        <div id="markdown-content" class="markdown-body">Loading README.md...</div>
    </div>

    <script>
        // 4. Fetch the README.md file and parse it
        fetch('README.md')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Could not find README.md in this directory.');
                }
                return response.text();
            })
            .then(markdown => {
                // Convert Markdown to HTML and inject it into the page
                document.getElementById('markdown-content').innerHTML = marked.parse(markdown);
            })
            .catch(error => {
                // Use GitHub's dark theme "danger red" for errors
                document.getElementById('markdown-content').innerHTML = '<p style="color: #f85149;">Error: ' + error.message + '</p>';
                console.error('Error loading README.md:', error);
            });
    </script>
</body>
</html>
