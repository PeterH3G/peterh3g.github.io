<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeterH3G's GitHub Pages</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <!-- 1. The canvas container for particles.js -->
    <div id="particles-js"></div>

    <div class="container">
        <!-- 2. The Markdown content will be injected here -->
        <div id="markdown-content" class="markdown-body">Loading README.md...</div>
    </div>

    <!-- 3. Load particles.js from the CDN you specified -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/1.0.0/particles.min.js"></script>

    <!-- 4. Initialize particles.js -->
    <script>
        // Configure the particle animation
        particlesJS('particles-js', {
            "particles": {
                "number": {
                    "value": 60,
                    "density": { "enable": true, "value_area": 800 }
                },
                "color": { "value": "#8b949e" }, /* GitHub Dark Muted Gray */
                "shape": { "type": "circle" },
                "opacity": {
                    "value": 0.4,
                    "random": true
                },
                "size": {
                    "value": 2.5,
                    "random": true
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#30363d", /* GitHub Dark Border color for the lines */
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 1.5, /* Slow, subtle movement */
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    /* Disabled hover/clicks so particles don't interfere with reading/scrolling */
                    "onhover": { "enable": false },
                    "onclick": { "enable": false },
                    "resize": true
                }
            },
            "retina_detect": true
        });

        // Fetch and parse README.md
        fetch('README.md')
            .then(response => {
                if (!response.ok) throw new Error('Could not find README.md');
                return response.text();
            })
            .then(markdown => {
                document.getElementById('markdown-content').innerHTML = marked.parse(markdown);
            })
            .catch(error => {
                document.getElementById('markdown-content').innerHTML = '<p style="color: #f85149;">Error: ' + error.message + '</p>';
            });
    </script>
</body>
</html>
